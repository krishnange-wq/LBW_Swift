name: Deploy to TestFlight

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: macos-15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Provisioning
        env:
          PROV_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo -n "$PROV_BASE64" | base64 --decode -o "$HOME/Library/MobileDevice/Provisioning Profiles/New_LBW_App_Store_Profile.mobileprovision"
          # Map UUID so Xcode 12.4 can find the profile by its internal ID
          UUID=$(grep -aA1 UUID "$HOME/Library/MobileDevice/Provisioning Profiles/New_LBW_App_Store_Profile.mobileprovision" | grep -oE "[-A-Z0-9]{36}" || echo "")
          if [ ! -z "$UUID" ]; then
            cp "$HOME/Library/MobileDevice/Provisioning Profiles/New_LBW_App_Store_Profile.mobileprovision" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          fi

      - name: Setup Certificate
        env:
          CERT_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          CERT_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          echo -n "$CERT_BASE64" | base64 --decode -o $RUNNER_TEMP/cert.p12
          security create-keychain -p "build-pass" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "build-pass" build.keychain
          security import $RUNNER_TEMP/cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          # This line prevents the "Permission Popup" hang we saw earlier
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "build-pass" build.keychain

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project "New LBW.xcodeproj" \
            -scheme "New LBW" \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/NewLBW.xcarchive \
            -configuration Release

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/NewLBW.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $RUNNER_TEMP/build

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ runner.temp }}/build/New LBW.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
