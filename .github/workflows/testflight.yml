name: Deploy to TestFlight
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: macos-15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Provisioning
        env:
          PROV_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo -n "$PROV_BASE64" | base64 --decode -o ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Setup Provisioning
        env:
          PROV_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          # We are naming the file exactly what Xcode expects
          echo -n "$PROV_BASE64" | base64 --decode -o "~/Library/MobileDevice/Provisioning Profiles/New LBW App Store Profile.mobileprovision"

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project "New LBW.xcodeproj" \
            -scheme "New LBW" \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/NewLBW.xcarchive \
            -configuration Release

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/NewLBW.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $RUNNER_TEMP/build

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ runner.temp }}/build/New LBW.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
